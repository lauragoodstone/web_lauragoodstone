<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Goodstone Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding: 18px 28px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .info {
      margin-top: 6px;
      font-size: 13px;
      color: #aaa;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .filter-btn,
    .small-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .filter-btn:hover,
    .small-btn:hover {
      background: rgba(245, 197, 66, 0.16);
      border-color: rgba(245, 197, 66, 0.5);
    }

    .filter-btn.active {
      background: #f5c542;
      color: #111;
      border-color: #f5c542;
    }

    main {
      padding: 28px;
    }

    .favorites-panel {
      background: #111;
      border: 1px solid rgba(245, 197, 66, 0.28);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 28px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .favorites-panel h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #f5c542;
    }

    .favorites-help {
      margin: 0 0 14px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.45;
    }

    .favorites-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .favorites-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .favorite-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px;
    }

    .favorite-url {
      color: #f1f1f1;
      font-size: 13px;
      word-break: break-all;
      user-select: all;
      cursor: pointer;
    }

    .favorite-url:hover {
      color: #f5c542;
    }

    .favorite-empty {
      color: #888;
      font-size: 14px;
      padding: 10px 0;
    }

    .favorite-import {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .favorite-import textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: #080808;
      color: #fff;
      padding: 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      outline: none;
    }

    .favorite-import textarea:focus {
      border-color: rgba(245, 197, 66, 0.55);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
    }

    .card {
      position: relative;
      background: #151515;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      transition: opacity 0.25s ease, filter 0.25s ease, transform 0.25s ease;
    }

    .card.dimmed-non-favorite {
      opacity: 0.22;
      filter: grayscale(1);
    }

    .card.dimmed-non-favorite:hover {
      opacity: 0.75;
      filter: grayscale(0.35);
    }

    .favorite-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .favorite-toggle:hover {
      transform: scale(1.06);
      background: rgba(245, 197, 66, 0.22);
    }

    .favorite-toggle.active {
      background: #f5c542;
      color: #111;
      border-color: #f5c542;
    }

    .card img {
      width: 100%;
      height: 360px;
      object-fit: contain;
      display: block;
      background: #000;
      cursor: pointer;
    }

    .caption {
      padding: 16px 14px 18px;
      font-size: 17px;
      line-height: 1.35;
      color: #f1f1f1;
      word-break: break-word;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      user-select: all;
    }

    .caption:hover {
      color: #f5c542;
    }

    .loading,
    .error {
      font-size: 16px;
      color: #ccc;
      padding: 30px 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      background: rgba(245, 197, 66, 0.96);
      color: #111;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 999;
      max-width: calc(100vw - 32px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }

    @media (max-width: 700px) {
      header {
        padding: 16px;
      }

      main {
        padding: 16px;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card img {
        height: 300px;
      }

      .caption {
        font-size: 16px;
      }

      .favorite-item {
        grid-template-columns: 1fr;
      }

      .small-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Laura Goodstone Image Gallery</h1>
    <div class="info" id="info">Loading images...</div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="w">Web 19:9</button>
      <button class="filter-btn" data-filter="p">Phone 4:4</button>
      <button class="filter-btn" id="dimNonFavoritesBtn">Dim Non-Favorites</button>
    </div>
  </header>

  <main>
    <section class="favorites-panel">
      <h2>Favorite Images</h2>
      <p class="favorites-help">
        Click the star on any image to save it here. Favorites stay saved in this browser.
        You can copy one favorite, copy all favorites, or paste/import a list of favorites.
      </p>

      <div class="favorites-actions">
        <button class="small-btn" id="copyAllFavoritesBtn">Copy All Favorites</button>
        <button class="small-btn" id="clearFavoritesBtn">Clear Favorites</button>
      </div>

      <div class="favorites-list" id="favoritesList"></div>

      <div class="favorite-import">
        <textarea id="favoritesInput" placeholder="Paste favorite URLs here, one per line. Example: https://lauragoodstone.com/w_01.webp"></textarea>
        <button class="small-btn" id="importFavoritesBtn">Import / Paste Favorites</button>
      </div>
    </section>

    <div id="status" class="loading">Searching .webp images in repository...</div>
    <div class="gallery" id="gallery"></div>
  </main>

  <div class="toast" id="toast">Copied image URL</div>

  <script>
    const owner = "lauragoodstone";
    const repo = "web_lauragoodstone";
    const branch = "main";

    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;

    /*
      This URL is used to display the image inside this gallery.
    */
    const siteBase = `https://${owner}.github.io/${repo}/`;

    /*
      This URL is what gets copied and saved as favorite.
      Example:
      https://lauragoodstone.com/w_01.webp
    */
    const publicBase = "https://lauragoodstone.com/";

    const favoritesStorageKey = "lauraGoodstoneFavoriteImages";

    const gallery = document.getElementById("gallery");
    const status = document.getElementById("status");
    const info = document.getElementById("info");
    const toast = document.getElementById("toast");
    const filterButtons = document.querySelectorAll(".filter-btn");

    const favoritesList = document.getElementById("favoritesList");
    const favoritesInput = document.getElementById("favoritesInput");
    const copyAllFavoritesBtn = document.getElementById("copyAllFavoritesBtn");
    const clearFavoritesBtn = document.getElementById("clearFavoritesBtn");
    const importFavoritesBtn = document.getElementById("importFavoritesBtn");
    const dimNonFavoritesBtn = document.getElementById("dimNonFavoritesBtn");

    let toastTimer = null;
    let allImages = [];
    let currentFilter = "all";
    let favorites = loadFavorites();
    let dimNonFavorites = false;

    function getFileName(path) {
      return path.split("/").pop().toLowerCase();
    }

    function getImageType(path) {
      const fileName = getFileName(path);

      if (fileName.startsWith("w")) return "w";
      if (fileName.startsWith("p")) return "p";

      return "other";
    }

    function getFilterLabel(filter) {
      if (filter === "w") return "Web 19:9";
      if (filter === "p") return "Phone 4:4";
      return "All";
    }

    function normalizeUrl(value) {
      return value.trim();
    }

    function pathToPublicUrl(path) {
      return publicBase + path;
    }

    function loadFavorites() {
      try {
        const saved = localStorage.getItem(favoritesStorageKey);
        if (!saved) return [];

        const parsed = JSON.parse(saved);

        if (!Array.isArray(parsed)) return [];

        return parsed
          .map(item => String(item).trim())
          .filter(Boolean);
      } catch (error) {
        return [];
      }
    }

    function saveFavorites() {
      localStorage.setItem(favoritesStorageKey, JSON.stringify(favorites));
    }

    function isFavorite(url) {
      return favorites.includes(url);
    }

    function getVisibleImages() {
      return allImages.filter(item => {
        if (currentFilter === "all") return true;
        return getImageType(item.path) === currentFilter;
      });
    }

    function updateInfo(visibleCount) {
      const total = allImages.length;
      const webCount = allImages.filter(item => getImageType(item.path) === "w").length;
      const phoneCount = allImages.filter(item => getImageType(item.path) === "p").length;
      const label = getFilterLabel(currentFilter);
      const favoriteCount = favorites.length;
      const dimStatus = dimNonFavorites ? "Dim: ON" : "Dim: OFF";

      info.textContent = `${visibleCount} showing / ${total} total — Web: ${webCount} — Phone: ${phoneCount} — Favorites: ${favoriteCount} — Filter: ${label} — ${dimStatus} — click image or name to copy full URL`;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(`Copied: ${text}`);
      } catch (error) {
        const tempInput = document.createElement("textarea");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);

        showToast(`Copied: ${text}`);
      }
    }

    function addFavorite(url) {
      const cleanUrl = normalizeUrl(url);

      if (!cleanUrl) return;

      if (!favorites.includes(cleanUrl)) {
        favorites.push(cleanUrl);
        saveFavorites();
      }
    }

    function removeFavorite(url) {
      favorites = favorites.filter(item => item !== url);
      saveFavorites();
    }

    function toggleFavorite(url) {
      if (isFavorite(url)) {
        removeFavorite(url);
        showToast("Removed from favorites");
      } else {
        addFavorite(url);
        showToast("Added to favorites");
      }

      renderFavorites();
      renderGallery();
    }

    function renderFavorites() {
      favoritesList.innerHTML = "";

      updateInfo(getVisibleImages().length);

      if (!favorites.length) {
        const empty = document.createElement("div");
        empty.className = "favorite-empty";
        empty.textContent = "No favorite images yet.";
        favoritesList.appendChild(empty);
        return;
      }

      favorites.forEach(url => {
        const item = document.createElement("div");
        item.className = "favorite-item";

        const urlText = document.createElement("div");
        urlText.className = "favorite-url";
        urlText.textContent = url;
        urlText.title = "Click to copy";
        urlText.addEventListener("click", () => copyText(url));

        const copyBtn = document.createElement("button");
        copyBtn.className = "small-btn";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => copyText(url));

        const removeBtn = document.createElement("button");
        removeBtn.className = "small-btn";
        removeBtn.textContent = "Remove";
        removeBtn.addEventListener("click", () => {
          removeFavorite(url);
          renderFavorites();
          renderGallery();
          showToast("Favorite removed");
        });

        item.appendChild(urlText);
        item.appendChild(copyBtn);
        item.appendChild(removeBtn);

        favoritesList.appendChild(item);
      });
    }

    function renderGallery() {
      gallery.innerHTML = "";

      const visibleImages = getVisibleImages();

      updateInfo(visibleImages.length);

      if (!visibleImages.length) {
        status.style.display = "block";
        status.className = "loading";
        status.textContent = `No images found for filter: ${getFilterLabel(currentFilter)}.`;
        return;
      }

      status.style.display = "none";

      visibleImages.forEach(item => {
        const imageUrl = siteBase + item.path;
        const imageCopyUrl = pathToPublicUrl(item.path);

        const card = document.createElement("div");
        card.className = "card";

        if (dimNonFavorites && !isFavorite(imageCopyUrl)) {
          card.classList.add("dimmed-non-favorite");
        }

        const favoriteBtn = document.createElement("button");
        favoriteBtn.className = "favorite-toggle";
        favoriteBtn.innerHTML = "★";
        favoriteBtn.title = "Add / remove favorite";
        favoriteBtn.classList.toggle("active", isFavorite(imageCopyUrl));
        favoriteBtn.addEventListener("click", event => {
          event.stopPropagation();
          toggleFavorite(imageCopyUrl);
        });

        const img = document.createElement("img");
        img.src = imageUrl;
        img.loading = "lazy";
        img.alt = imageCopyUrl;
        img.title = "Click to copy full image URL";

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = imageCopyUrl;
        caption.title = "Click to copy full image URL";

        img.addEventListener("click", () => copyText(imageCopyUrl));
        caption.addEventListener("click", () => copyText(imageCopyUrl));

        card.appendChild(favoriteBtn);
        card.appendChild(img);
        card.appendChild(caption);
        gallery.appendChild(card);
      });
    }

    function setFilter(filter) {
      currentFilter = filter;

      filterButtons.forEach(button => {
        if (button.dataset.filter) {
          button.classList.toggle("active", button.dataset.filter === filter);
        }
      });

      renderGallery();
      renderFavorites();
    }

    filterButtons.forEach(button => {
      if (button.dataset.filter) {
        button.addEventListener("click", () => {
          setFilter(button.dataset.filter);
        });
      }
    });

    dimNonFavoritesBtn.addEventListener("click", () => {
      dimNonFavorites = !dimNonFavorites;

      dimNonFavoritesBtn.classList.toggle("active", dimNonFavorites);

      if (dimNonFavorites) {
        dimNonFavoritesBtn.textContent = "Show All Normally";
        showToast("Non-favorite images dimmed");
      } else {
        dimNonFavoritesBtn.textContent = "Dim Non-Favorites";
        showToast("All images visible normally");
      }

      renderGallery();
      renderFavorites();
    });

    copyAllFavoritesBtn.addEventListener("click", () => {
      if (!favorites.length) {
        showToast("No favorites to copy");
        return;
      }

      copyText(favorites.join("\n"));
    });

    clearFavoritesBtn.addEventListener("click", () => {
      favorites = [];
      saveFavorites();
      renderFavorites();
      renderGallery();
      showToast("Favorites cleared");
    });

    importFavoritesBtn.addEventListener("click", () => {
      const pastedText = favoritesInput.value.trim();

      if (!pastedText) {
        showToast("Paste at least one favorite URL");
        return;
      }

      const importedFavorites = pastedText
        .split(/\n|,|\s+/)
        .map(item => item.trim())
        .filter(Boolean)
        .filter(item => item.startsWith(publicBase))
        .filter(item => item.toLowerCase().endsWith(".webp"));

      if (!importedFavorites.length) {
        showToast("No valid .webp URLs found");
        return;
      }

      importedFavorites.forEach(url => addFavorite(url));

      favoritesInput.value = "";
      saveFavorites();
      renderFavorites();
      renderGallery();

      showToast(`${importedFavorites.length} favorite(s) imported`);
    });

    async function loadImages() {
      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error("Could not read repository. Check if the repo is public and if the branch is main.");
        }

        const data = await response.json();

        allImages = data.tree
          .filter(item => item.type === "blob")
          .filter(item => item.path.toLowerCase().endsWith(".webp"))
          .sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }));

        if (!allImages.length) {
          status.style.display = "block";
          status.textContent = "No .webp images found.";
          info.textContent = "No images found";
          renderFavorites();
          return;
        }

        renderGallery();
        renderFavorites();

      } catch (error) {
        status.className = "error";
        status.textContent = error.message;
        info.textContent = "Error loading images";
        renderFavorites();
      }
    }

    loadImages();
  </script>
</body>
</html>
