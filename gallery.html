<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laura Goodstone Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding: 18px 28px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .info {
      margin-top: 6px;
      font-size: 13px;
      color: #aaa;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .filter-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 9px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .filter-btn:hover {
      background: rgba(245, 197, 66, 0.16);
      border-color: rgba(245, 197, 66, 0.5);
    }

    .filter-btn.active {
      background: #f5c542;
      color: #111;
      border-color: #f5c542;
    }

    main {
      padding: 28px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
    }

    .card {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      height: 360px;
      object-fit: contain;
      display: block;
      background: #000;
      cursor: pointer;
    }

    .caption {
      padding: 16px 14px 18px;
      font-size: 17px;
      line-height: 1.35;
      color: #f1f1f1;
      word-break: break-word;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      user-select: all;
    }

    .caption:hover {
      color: #f5c542;
    }

    .loading,
    .error {
      font-size: 16px;
      color: #ccc;
      padding: 30px 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      background: rgba(245, 197, 66, 0.96);
      color: #111;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }

    @media (max-width: 700px) {
      header {
        padding: 16px;
      }

      main {
        padding: 16px;
      }

      .gallery {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card img {
        height: 300px;
      }

      .caption {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Laura Goodstone Image Gallery</h1>
    <div class="info" id="info">Loading images...</div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="w">Web 19:9</button>
      <button class="filter-btn" data-filter="p">Phone 4:4</button>
    </div>
  </header>

  <main>
    <div id="status" class="loading">Searching .webp images in repository...</div>
    <div class="gallery" id="gallery"></div>
  </main>

  <div class="toast" id="toast">Copied image name</div>

  <script>
    const owner = "lauragoodstone";
    const repo = "web_lauragoodstone";
    const branch = "main";

    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
    const siteBase = `https://${owner}.github.io/${repo}/`;

    const gallery = document.getElementById("gallery");
    const status = document.getElementById("status");
    const info = document.getElementById("info");
    const toast = document.getElementById("toast");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let toastTimer = null;
    let allImages = [];
    let currentFilter = "all";

    function getFileName(path) {
      return path.split("/").pop().toLowerCase();
    }

    function getImageType(path) {
      const fileName = getFileName(path);

      if (fileName.startsWith("w")) return "w";
      if (fileName.startsWith("p")) return "p";

      return "other";
    }

    function getFilterLabel(filter) {
      if (filter === "w") return "Web 19:9";
      if (filter === "p") return "Phone 4:4";
      return "All";
    }

    function updateInfo(visibleCount) {
      const total = allImages.length;
      const webCount = allImages.filter(item => getImageType(item.path) === "w").length;
      const phoneCount = allImages.filter(item => getImageType(item.path) === "p").length;
      const label = getFilterLabel(currentFilter);

      info.textContent = `${visibleCount} showing / ${total} total — Web: ${webCount} — Phone: ${phoneCount} — Filter: ${label} — click image or name to copy`;
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1400);
    }

    async function copyImageName(imageName) {
      try {
        await navigator.clipboard.writeText(imageName);
        showToast(`Copied: ${imageName}`);
      } catch (error) {
        const tempInput = document.createElement("textarea");
        tempInput.value = imageName;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);

        showToast(`Copied: ${imageName}`);
      }
    }

    function renderGallery() {
      gallery.innerHTML = "";

      const visibleImages = allImages.filter(item => {
        if (currentFilter === "all") return true;
        return getImageType(item.path) === currentFilter;
      });

      updateInfo(visibleImages.length);

      if (!visibleImages.length) {
        status.style.display = "block";
        status.className = "loading";
        status.textContent = `No images found for filter: ${getFilterLabel(currentFilter)}.`;
        return;
      }

      status.style.display = "none";

      visibleImages.forEach(item => {
        const imageUrl = siteBase + item.path;
        const imageName = item.path;

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = imageUrl;
        img.loading = "lazy";
        img.alt = imageName;
        img.title = "Click to copy image name";

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = imageName;
        caption.title = "Click to copy image name";

        img.addEventListener("click", () => copyImageName(imageName));
        caption.addEventListener("click", () => copyImageName(imageName));

        card.appendChild(img);
        card.appendChild(caption);
        gallery.appendChild(card);
      });
    }

    function setFilter(filter) {
      currentFilter = filter;

      filterButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.filter === filter);
      });

      renderGallery();
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        setFilter(button.dataset.filter);
      });
    });

    async function loadImages() {
      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error("Could not read repository. Check if the repo is public and if the branch is main.");
        }

        const data = await response.json();

        allImages = data.tree
          .filter(item => item.type === "blob")
          .filter(item => item.path.toLowerCase().endsWith(".webp"))
          .sort((a, b) => a.path.localeCompare(b.path, undefined, { numeric: true }));

        if (!allImages.length) {
          status.style.display = "block";
          status.textContent = "No .webp images found.";
          info.textContent = "No images found";
          return;
        }

        renderGallery();

      } catch (error) {
        status.className = "error";
        status.textContent = error.message;
        info.textContent = "Error loading images";
      }
    }

    loadImages();
  </script>
</body>
</html>
