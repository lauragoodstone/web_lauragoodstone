<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Laura Goodstone | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Playball&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #efe4cc;
      --gold: #d7b56d;
      --soft: rgba(247, 241, 230, 0.9);
      --muted: rgba(247, 241, 230, 0.68);
      --display: "Rye", serif;
      --script: "Playball", cursive;
      --body: "Cormorant Garamond", serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #050505;
      color: var(--paper);
      font-family: var(--body);
      overflow: hidden;
    }

    body {
      min-height: 100svh;
      background-image:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.12),
          rgba(0, 0, 0, 0.34) 45%,
          rgba(0, 0, 0, 0.82)
        ),
        url("https://lauragoodstone.com/p_16.webp");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100svh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 32px 22px 46px;
      text-align: center;
    }

    .content {
      width: 100%;
      max-width: 390px;
    }

    .artist {
      display: block;
      margin-bottom: 10px;
      font-family: var(--script);
      font-size: 2.9rem;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 4px 18px rgba(0,0,0,0.85);
    }

    h1 {
      margin-bottom: 18px;
      font-family: var(--display);
      font-size: clamp(2.8rem, 15vw, 4.3rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--paper);
      text-shadow:
        3px 3px 0 rgba(0,0,0,0.45),
        0 8px 28px rgba(0,0,0,0.9);
    }

    .line {
      width: 100%;
      height: 7px;
      margin: 0 auto 22px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(215, 181, 109, 0.95),
        transparent
      );
    }

    p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 1.18rem;
      line-height: 1.5;
      color: var(--soft);
      text-shadow: 0 3px 16px rgba(0,0,0,0.9);
    }

    .device-note {
      margin-top: 22px;
      padding: 14px 16px;
      border-top: 1px solid rgba(215, 181, 109, 0.38);
      border-bottom: 1px solid rgba(215, 181, 109, 0.28);
      color: var(--paper);
      font-family: var(--display);
      font-size: 0.76rem;
      line-height: 1.6;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 3px 14px rgba(0,0,0,0.9);
    }

    .tagline {
      margin-top: 22px;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 3px 14px rgba(0,0,0,0.9);
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <span class="artist">Laura Goodstone</span>

      <h1>Coming Soon</h1>

      <div class="line"></div>

      <p>
        The mobile experience is being crafted to match the full visual and musical identity of the official website.
      </p>

      <div class="device-note">
        Please visit from a desktop or larger screen for the complete experience.
      </div>

      <div class="tagline">
        Country Rock Grit · Southern Heart · Rocking Soul
      </div>
    </section>
  </main>
</body>
</html>
