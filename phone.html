<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Laura Goodstone | Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Playball&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper: #efe4cc;
      --gold: #d7b56d;
      --soft: rgba(247, 241, 230, 0.88);
      --muted: rgba(247, 241, 230, 0.68);
      --display: "Rye", serif;
      --script: "Playball", cursive;
      --body: "Cormorant Garamond", serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #050505;
      color: var(--paper);
      font-family: var(--body);
    }

    body {
      min-height: 100svh;
      background-image:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.15),
          rgba(0, 0, 0, 0.35) 45%,
          rgba(0, 0, 0, 0.78)
        ),
        url("https://lauragoodstone.com/p_08.webp");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .page {
      min-height: 100svh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 32px 22px 46px;
      text-align: center;
    }

    .content {
      width: 100%;
      max-width: 390px;
    }

    .artist {
      display: block;
      margin-bottom: 10px;
      font-family: var(--script);
      font-size: 2.9rem;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 4px 18px rgba(0,0,0,0.85);
    }

    h1 {
      margin-bottom: 18px;
      font-family: var(--display);
      font-size: clamp(2.8rem, 15vw, 4.3rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--paper);
      text-shadow:
        3px 3px 0 rgba(0,0,0,0.45),
        0 8px 28px rgba(0,0,0,0.9);
    }

    .line {
      width: 100%;
      height: 7px;
      margin: 0 auto 22px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(215, 181, 109, 0.95),
        transparent
      );
    }

    p {
      margin: 0 auto;
      max-width: 340px;
      font-size: 1.18rem;
      line-height: 1.5;
      color: var(--soft);
      text-shadow: 0 3px 16px rgba(0,0,0,0.9);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      margin-top: 26px;
      border-radius: 999px;
      background: var(--gold);
      color: #20150a;
      text-decoration: none;
      font-family: var(--display);
      font-size: 0.78rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      box-shadow: 0 16px 36px rgba(0,0,0,0.55);
    }

    .tagline {
      margin-top: 22px;
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 3px 14px rgba(0,0,0,0.9);
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <span class="artist">Laura Goodstone</span>

      <h1>Coming Soon</h1>

      <div class="line"></div>

      <p>
        The mobile experience is being crafted. For now, visit the full desktop version.
      </p>

      <a class="btn" href="https://lauragoodstone.com/desktop">
        Visit Desktop Site
      </a>

      <div class="tagline">
        Country Rock Grit · Southern Heart · Rocking Soul
      </div>
    </section>
  </main>
</body>
</html>
